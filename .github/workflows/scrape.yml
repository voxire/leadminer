name: Scrape Lebanon Businesses

on:
  # schedule:
  #   - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:       # Manual trigger for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv --quiet
          uv pip install --system -r requirements.txt
          sudo apt-get install -y rclone -q

      - name: Set up rclone
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf

      - name: Download master CSVs
        run: |
          mkdir -p data/
          rclone copy "gdrive:leads/" data/ --max-depth 1 --include "*.csv" --drive-chunk-size 8M || true

      - name: Run scrapers
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SCRAPER_EMAIL: ${{ secrets.SCRAPER_EMAIL }}
        run: python main.py

      - name: Upload to Google Drive
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H-%M)
          rclone copy data/ "gdrive:leads/data/$TIMESTAMP/" --drive-chunk-size 8M
          rclone copy data/ "gdrive:leads/" --include "*.csv" --drive-chunk-size 8M
