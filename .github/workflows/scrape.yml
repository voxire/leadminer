name: Scrape Lebanon Businesses

on:
  schedule:
    - cron: '0 3 1 * *'  # 1st of every month at 03:00 UTC
  workflow_dispatch:       # Manual trigger for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv --quiet

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run scrapers
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SCRAPER_EMAIL: ${{ secrets.SCRAPER_EMAIL }}
        run: python main.py

      - name: Upload to Google Drive
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
        run: |
          sudo apt-get install -y rclone -q
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf
          DATE=$(date -u +%Y-%m-%d)
          echo "Uploading to gdrive:leads/$DATE/"
          ls -lh data/
          rclone copy data/ "gdrive:leads/$DATE/" --verbose --drive-chunk-size 8M
